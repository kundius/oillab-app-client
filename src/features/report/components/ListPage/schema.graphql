fragment ReportListPageItem on Report {
  id
  number
  totalMileage
  lubricantMileage
  samplingNodes
  note
  color
  sampledAt
  formNumber
  lubricantEntity {
    id
    brandEntity {
      id
      name
    }
    model
    viscosity
  }
  laboratoryResult {
    id
    name
    url
  }
  expressLaboratoryResult {
    id
    name
    url
  }
  consolidatedLaboratoryResult {
    id
    name
    url
  }
  client {
    id
    name
  }
  vehicle {
    id
    model
    releaseYear
    stateNumber
    engineModel
  }
}

query ReportListPageReportByFormNumber($formNumber: String!) {
  reportByFormNumber(formNumber: $formNumber) {
    ...ReportListPageItem
  }
}

query ReportListPageReportByStateNumber($stateNumber: String!) {
  reportByStateNumber(stateNumber: $stateNumber) {
    ...ReportListPageItem
  }
}

query ReportListPageReportPaginate(
  $sort: [ReportSort!]
  $filter: ReportFilter
  $page: Int
  $perPage: Int
) {
  reportPaginate(
    sort: $sort
    filter: $filter
    page: $page
    perPage: $perPage
  ) {
    pageInfo {
      total
      page
      perPage
    }
    items {
      ...ReportListPageItem
    }
  }
}

mutation ReportListPageReportGeneratePdf(
  $sort: [ReportSort!]
  $filter: ReportFilter
) {
  reportGeneratePdf(
    sort: $sort
    filter: $filter
  ) {
    success
    error {
      message
    }
    record {
      id
      url
    }
  }
}

mutation ReportListPageReportConsolidate(
  $id: Int!
  $input: ReportConsolidateInput!
) {
  reportConsolidate(
    id: $id
    input: $input
  ) {
    success
    error {
      message
    }
    record {
      ...ReportListPageItem
    }
  }
}